services:
  - type: web
    name: receipt-automation-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: receipt-automation-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_FIRESTORE_TOKENS_COLLECTION
        value: google_credentials
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_WEB_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_WEB_APP_ID
        sync: false
      - key: FIREBASE_WEB_MEASUREMENT_ID
        sync: false

databases:
  - name: receipt-automation-db
    plan: free
