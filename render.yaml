services:
  - type: web
    name: receipt-automation-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: receipt-automation-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: receipt-automation-db
    plan: free
