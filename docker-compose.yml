version: '3.8'

services:
  # Python FastAPI Service (SQLite)
  python-api:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: receipts-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # SQLite DB stored in mounted volume
      DATABASE_URL: sqlite:////data/receipts.db
      APP_ENV: production
      LOG_LEVEL: info
      SYNC_API_KEY: ${SYNC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-models/gemma-3-27b-it}
    volumes:
      - receipts_data:/data
      - ./python-service/app:/app/app
      - ./reports:/app/reports
      - ./sample_data:/app/sample_data

volumes:
  receipts_data:
    driver: local
